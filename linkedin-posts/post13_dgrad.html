<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>LUBIRA AI — La DGRAD a appelé</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    background: #0E0F12;
    font-family: 'Geist', sans-serif;
    position: relative;
  }

  /* SVG noise filter */
  .noise-filter {
    position: absolute;
    width: 0;
    height: 0;
  }

  /* Noise overlay */
  .noise-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    filter: url(#noiseFilter);
    opacity: 0.035;
    background: #F5F0E8;
    pointer-events: none;
    z-index: 10;
  }

  /* Ambient radial glow — urgency red-copper at top */
  .ambient-glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 500px at 50% -60px, rgba(179, 58, 42, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 80% 10%, rgba(184, 99, 58, 0.05) 0%, transparent 60%),
      radial-gradient(ellipse 400px 800px at 10% 50%, rgba(184, 99, 58, 0.025) 0%, transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* Top urgency bar */
  .urgency-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #B33A2A 0%, #B8633A 50%, #D88A5E 100%);
    z-index: 5;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 5;
    padding: 72px 88px 0 88px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid rgba(184, 99, 58, 0.3);
    border-radius: 999px;
    padding: 8px 20px 8px 16px;
    margin-top: 40px;
    width: fit-content;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #B33A2A;
    box-shadow: 0 0 8px rgba(179, 58, 42, 0.5);
  }

  .badge-text {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #D88A5E;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* Main headline */
  .headline {
    margin-top: 56px;
    line-height: 1.0;
  }

  .headline-line1 {
    font-family: 'Instrument Serif', serif;
    font-size: 118px;
    font-weight: 400;
    color: #F5F0E8;
    letter-spacing: -0.02em;
  }

  .headline-line2 {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-top: -4px;
  }

  .headline-a {
    font-family: 'Instrument Serif', serif;
    font-size: 118px;
    font-weight: 400;
    color: #F5F0E8;
    letter-spacing: -0.02em;
  }

  .headline-appele {
    font-family: 'Instrument Serif', serif;
    font-size: 118px;
    font-weight: 400;
    font-style: italic;
    color: #B33A2A;
    letter-spacing: -0.02em;
  }

  /* Subtext */
  .subtext {
    margin-top: 32px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 34px;
    color: #6B6660;
    line-height: 1.45;
    letter-spacing: 0.005em;
  }

  .subtext .slash {
    color: #4A4843;
  }

  /* Copper rule */
  .rule {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, #B8633A, rgba(184, 99, 58, 0.15));
    margin-top: 40px;
    border: none;
  }

  /* Checklist */
  .checklist {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    list-style: none;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .checklist-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid rgba(184, 99, 58, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #D88A5E;
    flex-shrink: 0;
  }

  .checklist-text {
    font-family: 'Geist', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: #A39E96;
    letter-spacing: 0.005em;
  }

  .checklist-item.alert .checklist-num {
    border-color: rgba(179, 58, 42, 0.5);
    color: #B33A2A;
    background: rgba(179, 58, 42, 0.06);
  }

  .checklist-item.alert .checklist-text {
    color: #D88A5E;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 88px 56px 88px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 5;
  }

  .footer::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 88px;
    right: 88px;
    height: 1px;
    background: linear-gradient(90deg, rgba(184, 99, 58, 0.2), rgba(184, 99, 58, 0.06));
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    position: relative;
    width: 32px;
    height: 40px;
  }

  .logo-L {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    color: #F5F0E8;
    line-height: 1;
    position: absolute;
    bottom: 0;
    left: 0;
  }

  .logo-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #B8633A;
    position: absolute;
    top: 0;
    left: 8px;
  }

  .logo-wordmark {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #F5F0E8;
    letter-spacing: 0.12em;
  }

  .logo-wordmark .ai {
    font-style: italic;
    color: #B8633A;
  }

  .footer-location {
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    color: #6B6660;
    letter-spacing: 0.1em;
  }

  /* Subtle vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 50%, rgba(14, 15, 18, 0.4) 100%);
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>

<!-- SVG Noise Filter -->
<svg class="noise-filter">
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>

<!-- Layers -->
<div class="ambient-glow"></div>
<div class="vignette"></div>
<div class="noise-overlay"></div>

<!-- Top urgency bar -->
<div class="urgency-bar"></div>

<!-- Content -->
<div class="content">

  <!-- Badge -->
  <div class="badge">
    <div class="badge-dot"></div>
    <span class="badge-text">Urgence</span>
  </div>

  <!-- Headline -->
  <div class="headline">
    <div class="headline-line1">La DGRAD</div>
    <div class="headline-line2">
      <span class="headline-a">a</span>
      <span class="headline-appele">appelé.</span>
    </div>
  </div>

  <!-- Subtext -->
  <p class="subtext">
    Votre rapport devait partir vendredi.<br>
    On est mardi.
  </p>

  <!-- Rule -->
  <hr class="rule">

  <!-- Checklist -->
  <ul class="checklist">
    <li class="checklist-item">
      <div class="checklist-num">1</div>
      <span class="checklist-text">47 fichiers Excel à ouvrir</span>
    </li>
    <li class="checklist-item">
      <div class="checklist-num">2</div>
      <span class="checklist-text">Factures manquantes de mars</span>
    </li>
    <li class="checklist-item">
      <div class="checklist-num">3</div>
      <span class="checklist-text">Mails sans réponse depuis 3 semaines</span>
    </li>
    <li class="checklist-item alert">
      <div class="checklist-num">4</div>
      <span class="checklist-text">Rapport envoyé avec des approximations</span>
    </li>
  </ul>

</div>

<!-- Footer -->
<div class="footer">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-dot"></div>
      <div class="logo-L">L</div>
    </div>
    <span class="logo-wordmark">LUBIRA <span class="ai">AI</span></span>
  </div>
  <span class="footer-location">LUBUMBASHI · RDC</span>
</div>

</body>
</html>
