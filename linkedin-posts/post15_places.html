<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>LUBIRA AI — 5 Places Ce Mois</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    background: #0E0F12;
    font-family: 'Geist', sans-serif;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── SVG Noise Filter ── */
  .noise-defs { position: absolute; width: 0; height: 0; }

  /* ── Noise Grain Overlay ── */
  .noise-overlay {
    position: absolute;
    inset: 0;
    width: 1200px;
    height: 1200px;
    filter: url(#noiseFilter);
    opacity: 0.32;
    z-index: 1;
    pointer-events: none;
  }

  /* ── Ambient Radial Glow (behind circle) ── */
  .ambient-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -56%);
    width: 750px;
    height: 750px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,99,58,0.18) 0%, rgba(184,99,58,0.06) 40%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  /* ── Secondary soft wash ── */
  .ambient-wash {
    position: absolute;
    top: 0;
    left: 0;
    width: 1200px;
    height: 1200px;
    background: radial-gradient(ellipse 900px 600px at 50% 42%, rgba(184,99,58,0.06) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  /* ── Content Layer ── */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
  }

  /* ── Pill Badge ── */
  .pill-badge {
    margin-top: 100px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 28px;
    border: 1px solid rgba(184,99,58,0.4);
    border-radius: 999px;
    background: rgba(184,99,58,0.06);
  }

  .pill-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #B8633A;
    box-shadow: 0 0 8px rgba(184,99,58,0.7), 0 0 20px rgba(184,99,58,0.3);
  }

  .pill-text {
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: #D88A5E;
    text-transform: uppercase;
  }

  /* ── Hero Circle ── */
  .circle-wrapper {
    margin-top: 72px;
    position: relative;
    width: 350px;
    height: 350px;
  }

  /* Outer glow ring */
  .circle-wrapper::before {
    content: '';
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(184,99,58,0.12) 60%, transparent 100%);
    z-index: 0;
  }

  /* Subtle outer ring */
  .circle-wrapper::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(184,99,58,0.15);
    z-index: 0;
  }

  .hero-circle {
    position: relative;
    z-index: 1;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #B8633A 0%, #9C5530 40%, #8B4A2B 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      inset 0 -12px 40px rgba(0,0,0,0.35),
      inset 0 8px 30px rgba(245,240,232,0.06),
      0 20px 60px rgba(0,0,0,0.5),
      0 0 80px rgba(184,99,58,0.15);
  }

  .hero-number {
    font-family: 'Instrument Serif', serif;
    font-size: 210px;
    font-weight: 400;
    color: #F5F0E8;
    line-height: 1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.25);
    /* subtle shift up for optical center */
    margin-top: -12px;
  }

  /* ── Subtitle ── */
  .subtitle {
    margin-top: 36px;
    font-family: 'Geist Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: #D88A5E;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  /* ── Thin Copper Rule ── */
  .rule {
    margin-top: 52px;
    width: 520px;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(184,99,58,0.35) 30%, rgba(184,99,58,0.35) 70%, transparent 100%);
  }

  /* ── Features Row ── */
  .features {
    margin-top: 44px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .feature-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feature-check {
    font-family: 'Geist', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: #B8633A;
    line-height: 1;
  }

  .feature-label {
    font-family: 'Geist', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: #A39E96;
    line-height: 1;
  }

  .feature-sep {
    margin: 0 28px;
    font-size: 14px;
    color: rgba(107,102,96,0.4);
    line-height: 1;
  }

  /* ── CTA Line ── */
  .cta {
    margin-top: 56px;
    text-align: center;
    line-height: 1.3;
  }

  .cta-text {
    font-family: 'Instrument Serif', serif;
    font-size: 34px;
    font-weight: 400;
    color: #F5F0E8;
  }

  .cta-arrow {
    color: #D88A5E;
  }

  .cta-number {
    font-family: 'Instrument Serif', serif;
    font-size: 34px;
    font-weight: 400;
    color: #D88A5E;
  }

  /* ── Footer ── */
  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 88px;
    padding: 0 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(107,102,96,0.12);
    z-index: 2;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    position: relative;
    width: 32px;
    height: 40px;
  }

  .logo-l {
    font-family: 'Instrument Serif', serif;
    font-size: 34px;
    font-weight: 400;
    color: #F5F0E8;
    line-height: 1;
    position: absolute;
    bottom: 0;
    left: 0;
  }

  .logo-dot {
    position: absolute;
    top: 0;
    left: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #B8633A;
  }

  .logo-wordmark {
    font-family: 'Geist', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: #A39E96;
  }

  .logo-wordmark .ai {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: #B8633A;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .footer-location {
    font-family: 'Geist Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #6B6660;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- SVG Noise Filter Definition -->
  <svg class="noise-defs" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="noiseFilter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise" />
        <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise" />
        <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" />
      </filter>
    </defs>
  </svg>

  <!-- Noise Grain Overlay -->
  <div class="noise-overlay"></div>

  <!-- Ambient Glow Effects -->
  <div class="ambient-wash"></div>
  <div class="ambient-glow"></div>

  <!-- Content -->
  <div class="content">

    <!-- Pill Badge -->
    <div class="pill-badge">
      <div class="pill-dot"></div>
      <span class="pill-text">Offre Limitée</span>
    </div>

    <!-- Hero Circle -->
    <div class="circle-wrapper">
      <div class="hero-circle">
        <span class="hero-number">5</span>
      </div>
    </div>

    <!-- Subtitle -->
    <div class="subtitle">Places ce mois</div>

    <!-- Copper Rule -->
    <div class="rule"></div>

    <!-- Features -->
    <div class="features">
      <div class="feature-item">
        <span class="feature-check">✓</span>
        <span class="feature-label">Audit gratuit</span>
      </div>
      <span class="feature-sep">·</span>
      <div class="feature-item">
        <span class="feature-check">✓</span>
        <span class="feature-label">Confidentiel</span>
      </div>
      <span class="feature-sep">·</span>
      <div class="feature-item">
        <span class="feature-check">✓</span>
        <span class="feature-label">Résultat en 48h</span>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta">
      <span class="cta-text">DM ou WhatsApp </span><span class="cta-arrow">→ </span><span class="cta-number">+243 995 974 770</span>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-logo">
      <div class="logo-mark">
        <div class="logo-dot"></div>
        <span class="logo-l">L</span>
      </div>
      <span class="logo-wordmark">LUBIRA <span class="ai">AI</span></span>
    </div>
    <span class="footer-location">Lubumbashi · RDC</span>
  </div>

</body>
</html>
