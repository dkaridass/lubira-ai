<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1200px; height:1200px; overflow:hidden; }

  .slide {
    width:1200px; height:1200px;
    display:flex; flex-direction:column; justify-content:center;
    padding:100px;
    background:#0E0F12; color:#F5F0E8;
    font-family:'Geist',system-ui,sans-serif;
    position:relative;
  }

  .eyebrow {
    font-family:'Geist Mono',monospace; font-size:14px;
    letter-spacing:.22em; text-transform:uppercase;
    color:#D88A5E; margin-bottom:48px;
  }
  .title {
    font-family:'Instrument Serif',serif; font-size:90px;
    font-weight:400; line-height:1; letter-spacing:-.03em;
    color:#F5F0E8; margin-bottom:72px;
  }
  .items { display:flex; flex-direction:column; gap:0; }
  .item {
    display:flex; align-items:center; gap:28px;
    padding:36px 0;
    border-bottom:1px solid rgba(214,207,195,.12);
  }
  .item:first-child { border-top:1px solid rgba(214,207,195,.12); }
  .num {
    font-family:'Geist Mono',monospace; font-size:18px;
    color:#B8633A; font-weight:500; width:40px; flex-shrink:0;
  }
  .label {
    font-family:'Instrument Serif',serif; font-size:42px;
    font-weight:400; color:#F5F0E8; flex:1;
  }
  .arrow {
    font-family:'Geist Mono',monospace; font-size:24px;
    color:#6B6660;
  }

  .footer {
    position:absolute; bottom:80px; left:100px; right:100px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo .mark { display:flex; flex-direction:column; align-items:flex-start; }
  .logo .disc { width:14px; height:14px; border-radius:50%; background:#B8633A; margin-bottom:-4px; margin-left:7px; }
  .logo .L { font-family:'Instrument Serif',serif; font-size:38px; line-height:.78; color:#F5F0E8; }
  .logo .wordmark { font-family:'Instrument Serif',serif; font-size:24px; color:#F5F0E8; display:flex; gap:6px; }
  .logo .wordmark .ai { font-style:italic; color:#D88A5E; }
  .cta {
    font-family:'Geist Mono',monospace; font-size:12px;
    letter-spacing:.14em; text-transform:uppercase; color:#6B6660;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">// Diagnostic</div>
  <div class="title">3 signes que votre<br>entreprise perd de<br>l'argent <span style="color:#D88A5E;font-style:italic">sans IA</span>.</div>
  <div class="items">
    <div class="item">
      <span class="num">01</span>
      <span class="label">Rapports manuels</span>
      <span class="arrow">→</span>
    </div>
    <div class="item">
      <span class="num">02</span>
      <span class="label">Questions répétitives</span>
      <span class="arrow">→</span>
    </div>
    <div class="item">
      <span class="num">03</span>
      <span class="label">Données obsolètes</span>
      <span class="arrow">→</span>
    </div>
  </div>
  <div class="footer">
    <div class="logo">
      <div class="mark"><div class="disc"></div><div class="L">L</div></div>
      <div class="wordmark"><span>LUBIRA</span><span class="ai">AI</span></div>
    </div>
    <div class="cta">Commentez 1, 2 ou 3 ↓</div>
  </div>
</div>
</body>
</html>
