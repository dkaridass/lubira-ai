<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:1200px;overflow:hidden}
  .slide{width:1200px;height:1200px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0E0F12;color:#F5F0E8;position:relative;padding:100px}
  .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(184,99,58,.15);border:1px solid rgba(184,99,58,.4);color:#D88A5E;padding:8px 18px;border-radius:999px;font-family:'Geist Mono',monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:60px}
  .badge .dot{width:8px;height:8px;border-radius:50%;background:#D88A5E}
  .circle{width:320px;height:320px;border-radius:50%;background:#B8633A;display:grid;place-items:center;margin-bottom:48px;box-shadow:0 0 120px rgba(184,99,58,.3)}
  .circle .num{font-family:'Instrument Serif',serif;font-size:180px;color:#F5F0E8;line-height:1}
  .ring-text{font-family:'Geist Mono',monospace;font-size:16px;letter-spacing:.22em;text-transform:uppercase;color:#D88A5E;margin-bottom:48px}
  .details{font-family:'Geist',sans-serif;font-size:22px;color:#A39E96;display:flex;gap:24px;align-items:center}
  .details span{display:flex;align-items:center;gap:8px}
  .details .sep{width:4px;height:4px;border-radius:50%;background:#6B6660}
  .footer{position:absolute;bottom:80px;left:100px;right:100px;display:flex;justify-content:space-between;align-items:center}
  .logo{display:flex;align-items:center;gap:14px}
  .logo .mark{display:flex;flex-direction:column;align-items:flex-start}
  .logo .disc{width:14px;height:14px;border-radius:50%;background:#B8633A;margin-bottom:-4px;margin-left:7px}
  .logo .L{font-family:'Instrument Serif',serif;font-size:38px;line-height:.78;color:#F5F0E8}
  .logo .wordmark{font-family:'Instrument Serif',serif;font-size:24px;color:#F5F0E8;display:flex;gap:6px}
  .logo .wordmark .ai{font-style:italic;color:#D88A5E}
  .loc{font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#6B6660}
</style>
</head>
<body>
<div class="slide">
  <div class="badge"><div class="dot"></div>Offre limitée</div>
  <div class="circle"><div class="num">5</div></div>
  <div class="ring-text">Places disponibles ce mois</div>
  <div class="details">
    <span>Audit gratuit</span><span class="sep"></span>
    <span>NDA signé</span><span class="sep"></span>
    <span>Livraison 48h</span>
  </div>
  <div class="footer">
    <div class="logo"><div class="mark"><div class="disc"></div><div class="L">L</div></div><div class="wordmark"><span>LUBIRA</span><span class="ai">AI</span></div></div>
    <div class="loc">Lubumbashi · RDC</div>
  </div>
</div>
</body>
</html>
