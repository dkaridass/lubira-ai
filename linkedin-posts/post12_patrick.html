<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:1200px;overflow:hidden;background:#0E0F12}

  .slide{
    width:1200px;height:1200px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#0E0F12;color:#F5F0E8;
    font-family:'Geist',system-ui,sans-serif;
    position:relative;
    padding:100px 120px;
    text-align:center;
    overflow:hidden;
  }

  /* ── SVG noise texture filter ── */
  .noise-overlay{
    position:absolute;inset:0;
    opacity:.035;
    mix-blend-mode:overlay;
    pointer-events:none;
    z-index:10;
  }

  /* ── Radial gradient: warm halo behind number ── */
  .slide::before{
    content:"";position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-55%);
    width:900px;height:700px;
    background:radial-gradient(ellipse at center,rgba(184,99,58,.07),rgba(184,99,58,.02) 45%,transparent 70%);
    pointer-events:none;z-index:1;
  }

  /* ── Radial gradient: bottom edge warmth ── */
  .slide::after{
    content:"";position:absolute;
    bottom:-200px;right:-100px;
    width:800px;height:600px;
    background:radial-gradient(circle,rgba(139,74,43,.04),transparent 55%);
    pointer-events:none;z-index:1;
  }

  /* ── Secondary ambient glow ── */
  .ambient{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:radial-gradient(ellipse at 70% 20%,rgba(184,99,58,.03),transparent 50%);
    pointer-events:none;z-index:1;
  }

  /* ── Content wrapper ── */
  .content{
    position:relative;z-index:5;
    display:flex;flex-direction:column;
    align-items:center;
    width:100%;
  }

  /* ── Time badge (top-right) ── */
  .time-badge{
    position:absolute;top:80px;right:120px;
    display:flex;flex-direction:column;align-items:flex-end;gap:6px;
    z-index:5;
  }
  .time-badge .hour{
    font-family:'Instrument Serif',serif;
    font-size:68px;color:#F5F0E8;
    line-height:.9;letter-spacing:-.02em;
    text-shadow:0 2px 30px rgba(184,99,58,.08);
  }
  .time-badge .sub{
    font-family:'Geist Mono',monospace;
    font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:#6B6660;
    line-height:1.3;
  }

  /* ── Decorative corner marks ── */
  .corner-tl{
    position:absolute;top:80px;left:120px;
    width:28px;height:28px;
    border-left:1.5px solid rgba(184,99,58,.2);
    border-top:1.5px solid rgba(184,99,58,.2);
    z-index:2;
  }
  .corner-br{
    position:absolute;bottom:140px;right:120px;
    width:28px;height:28px;
    border-right:1.5px solid rgba(184,99,58,.2);
    border-bottom:1.5px solid rgba(184,99,58,.2);
    z-index:2;
  }

  /* ── WhatsApp eyebrow with flanking lines ── */
  .eyebrow{
    font-family:'Geist Mono',monospace;font-size:13px;
    letter-spacing:.22em;text-transform:uppercase;
    color:#D88A5E;margin-bottom:28px;
    display:flex;align-items:center;gap:18px;
    justify-content:center;
  }
  .eyebrow-line{
    width:44px;height:1.5px;
    background:linear-gradient(90deg,rgba(184,99,58,.15),#D88A5E);
    flex-shrink:0;
  }
  .eyebrow-line.right{
    background:linear-gradient(90deg,#D88A5E,rgba(184,99,58,.15));
  }

  /* ── ENORMOUS stat number ── */
  .big-number{
    font-family:'Instrument Serif',serif;
    font-size:300px;font-weight:400;
    line-height:.82;letter-spacing:-.05em;
    color:#F5F0E8;
    margin-bottom:8px;
    position:relative;
    text-shadow:
      0 4px 60px rgba(184,99,58,.08),
      0 1px 0 rgba(245,240,232,.1);
  }

  /* ── Sub label ── */
  .sub-label{
    font-family:'Geist Mono',monospace;
    font-size:16px;font-weight:400;
    letter-spacing:.25em;text-transform:uppercase;
    color:#D88A5E;
    margin-bottom:56px;
  }

  /* ── Copper divider ── */
  .divider{
    width:80px;height:1.5px;
    background:linear-gradient(90deg,rgba(184,99,58,.15),#B8633A,rgba(184,99,58,.15));
    margin:0 auto 48px;
    border-radius:999px;
  }

  /* ── Italic quote block ── */
  .context{
    font-family:'Instrument Serif',serif;
    font-size:32px;font-weight:400;
    line-height:1.4;color:#A39E96;
    font-style:italic;max-width:680px;
    margin:0 auto;
    letter-spacing:-.005em;
  }
  .context strong{
    color:#F5F0E8;
    font-style:normal;font-weight:400;
  }

  /* ── Vertical decorative accent ── */
  .vert-accent-left{
    position:absolute;
    left:56px;top:50%;
    transform:translateY(-50%);
    width:1.5px;height:120px;
    background:linear-gradient(180deg,transparent,rgba(184,99,58,.2),transparent);
    z-index:2;
  }

  /* ── Footer ── */
  .footer{
    position:absolute;bottom:0;left:0;right:0;
    padding:0 120px 68px;
    z-index:5;
  }
  .footer::before{
    content:"";position:absolute;
    top:0;left:120px;right:120px;
    height:1px;
    background:linear-gradient(90deg,rgba(107,102,96,.3),rgba(107,102,96,.06));
  }
  .footer-inner{
    padding-top:30px;
    display:flex;justify-content:space-between;align-items:center;
  }

  .logo{display:flex;align-items:center;gap:16px}
  .logo .mark{
    display:flex;flex-direction:column;align-items:center;
    position:relative;
  }
  .logo .dot{
    width:8px;height:8px;border-radius:50%;
    background:#B8633A;
    margin-bottom:2px;
    box-shadow:0 0 12px rgba(184,99,58,.3);
  }
  .logo .L{
    font-family:'Instrument Serif',serif;
    font-size:36px;line-height:.78;color:#F5F0E8;
    letter-spacing:0;
  }
  .logo .wordmark{
    font-family:'Geist',sans-serif;
    font-size:15px;font-weight:500;
    letter-spacing:.12em;
    color:#F5F0E8;
    display:flex;gap:5px;
    text-transform:uppercase;
  }
  .logo .wordmark .ai{
    font-family:'Instrument Serif',serif;
    font-style:italic;color:#D88A5E;
    font-size:17px;font-weight:400;
    letter-spacing:0;
    position:relative;top:-0.5px;
  }

  .location{
    font-family:'Geist Mono',monospace;
    font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;color:#6B6660;
  }
</style>
</head>
<body>
<div class="slide">

  <!-- SVG noise filter -->
  <svg class="noise-overlay" width="100%" height="100%">
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise)"/>
  </svg>

  <!-- Ambient glow -->
  <div class="ambient"></div>

  <!-- Decorative corner marks -->
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <!-- Decorative vertical accent -->
  <div class="vert-accent-left"></div>

  <!-- Time badge -->
  <div class="time-badge">
    <div class="hour">22h</div>
    <div class="sub">Il est encore au bureau</div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="eyebrow">
      <span class="eyebrow-line"></span>
      WhatsApp
      <span class="eyebrow-line right"></span>
    </div>

    <div class="big-number">347</div>
    <div class="sub-label">Messages non lus</div>

    <div class="divider"></div>

    <div class="context">
      Quelque part dans ce chaos,<br>
      il y a une commande de <strong>$12,000</strong>.<br>
      Personne ne sait qui devait la traiter.
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-inner">
      <div class="logo">
        <div class="mark">
          <div class="dot"></div>
          <div class="L">L</div>
        </div>
        <div class="wordmark">
          <span>Lubira</span>
          <span class="ai">AI</span>
        </div>
      </div>
      <div class="location">Lubumbashi · RDC</div>
    </div>
  </div>
</div>
</body>
</html>
